mistral:
  module: app.translation.providers.mistral
  class: MistralProvider
  description: Mistral AI Translation Provider
  limit_type: tokens
  default_rate_limit: 1
  default_max_units: 4000
  retry:
    max_attempts: 3
    initial_delay: 1
    max_delay: 10
  features:
    streaming: true
    batch_translation: false

groq:
  module: app.translation.providers.groq
  class: GroqProvider
  description: Groq AI Translation Provider
  limit_type: tokens
  default_rate_limit: 1
  default_max_units: 3000
  retry:
    max_attempts: 10
    initial_delay: 1
    max_delay: 10
  features:
    streaming: true
    batch_translation: false

google:
  module: app.translation.providers.google
  class: GoogleProvider
  description: Google Translate (Free API)
  limit_type: chars
  default_rate_limit: 30
  default_max_units: 4000
  retry:
    max_attempts: 10
    initial_delay: 1
    max_delay: 10
  features:
    streaming: false
    batch_translation: false

deepl:
  module: app.translation.providers.deepl
  class: DeepLProvider
  description: DeepL Translation Provider (Free API)
  limit_type: chars
  default_rate_limit: 30
  default_max_units: 4000
  retry:
    max_attempts: 10
    initial_delay: 1
    max_delay: 10
  features:
    streaming: false
    batch_translation: false
