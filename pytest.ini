# pytest.ini
[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    asyncio: mark test as an async test
    slow: mark test as slow running
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore::FutureWarning:ebooklib.*
    ignore::pytest.PytestDeprecationWarning:pytest_asyncio.*
    ignore::pytest_cov.plugin.CovReportWarning

# Set default event loop scope for async fixtures
asyncio_default_fixture_loop_scope = function

# Coverage configuration
addopts = -v --cov=app --cov-report=term-missing --cov-report=html --log-level=ERROR