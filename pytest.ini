# pytest.ini
[pytest]
addopts = -v --cov=app --cov-report=term-missing
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    asyncio: mark test as an async test
    slow: mark test as slow running
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning